<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생용 링크 모음</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <link rel="apple-touch-icon" href="icon.png"> 

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          // 주의: 아래 따옴표 안에 아까 발급받은 App ID를 복사해서 붙여넣으세요!
          appId: "ced69ad9-8c33-42bc-8c8b-9200ac22ae40", 
        });
      });
    </script>

    <style>
        /* CSS는 기존과 동일하게 유지합니다 */
        body { font-family: '맑은 고딕', sans-serif; background-color: #f4f7f6; text-align: center; padding: 30px 15px; }
        /* ... (중략: 기존 CSS 코드) ... */
    </style>
</head>
<body>
    <h1>📚 감정 6-3 즐겨찾기 📚</h1>
    <div class="link-container" id="linkContainer"></div>

    <script>
        // 수정된 링크 데이터 부분입니다!
        const links = [
            { name: '그라운드카드', url: 'https://growndcard.com', isNew: false },
            { name: '카훗', url: 'https://kahoot.it', isNew: false },
            { name: '블루킷', url: 'https://play.blooket.com/play', isNew: false }
        ];

        const container = document.getElementById('linkContainer');

        links.forEach(link => {
            const anchor = document.createElement('a');
            anchor.href = link.url;
            anchor.target = '_blank';
            anchor.className = 'link-button';
            anchor.textContent = link.name;
            if (link.isNew === true) {
                const badge = document.createElement('span');
                badge.className = 'new-badge';
                badge.textContent = 'NEW';
                anchor.appendChild(badge);
            }
            container.appendChild(anchor);
        });

        // [PWA 추가 설정] 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('서비스 워커가 등록되었습니다!', reg))
                    .catch(err => console.log('서비스 워커 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
